asyncapi: 2.6.0
info:
  title: Smart Device Service Message API
  version: 1.0.0
  description: Asynchronous communication for Smart Device Service

servers:
  production:
    url: amqp://localhost:5672
    protocol: amqp
    description: Local RabbitMQ server

channels:
  device.commands:
    description: Channel for sending commands to devices
    publish:
      message:
        $ref: '#/components/messages/DeviceCommandMessage'

  device.events:
    description: Channel for receiving device events
    subscribe:
      message:
        $ref: '#/components/messages/DeviceEventMessage'

  device.telemetry:
    description: Channel for receiving telemetry data
    subscribe:
      message:
        $ref: '#/components/messages/TelemetryMessage'

  scenario.execution:
    description: Channel for scenario execution events
    publish:
      message:
        $ref: '#/components/messages/ScenarioExecutionMessage'

components:
  messages:
    DeviceCommandMessage:
      name: deviceCommandMessage
      title: Device Command
      summary: Command sent from Smart Device Service to Device Gateway
      contentType: application/json
      payload:
        type: object
        properties:
          commandId:
            type: string
            format: uuid
            description: Unique command identifier
          deviceId:
            type: string
            format: uuid
            description: Target device identifier
          command:
            type: string
            description: Command name (e.g., turn_on, set_temperature)
          parameters:
            type: object
            additionalProperties: true
            description: Command parameters
          sourceType:
            type: string
            enum: [user, scenario, system]
            description: Source of the command
          sourceId:
            type: string
            format: uuid
            description: ID of the source (user or scenario)
          priority:
            type: integer
            minimum: 0
            maximum: 10
            default: 0
            description: Command priority
          timestamp:
            type: integer
            format: int64
            description: Unix timestamp in milliseconds

    DeviceEventMessage:
      name: deviceEventMessage
      title: Device Event
      summary: Event from Device Gateway about device status
      contentType: application/json
      payload:
        type: object
        properties:
          eventId:
            type: string
            format: uuid
          deviceId:
            type: string
            format: uuid
          eventType:
            type: string
            enum: [status_changed, command_executed, command_failed, error]
          data:
            type: object
            additionalProperties: true
          timestamp:
            type: integer
            format: int64

    TelemetryMessage:
      name: telemetryMessage
      title: Telemetry Data
      summary: Telemetry data from devices
      contentType: application/json
      payload:
        type: object
        properties:
          deviceId:
            type: string
            format: uuid
          sensorType:
            type: string
          value:
            type: number
          unit:
            type: string
          timestamp:
            type: integer
            format: int64

    ScenarioExecutionMessage:
      name: scenarioExecutionMessage
      title: Scenario Execution Event
      summary: Event when scenario is executed
      contentType: application/json
      payload:
        type: object
        properties:
          scenarioId:
            type: string
            format: uuid
          userId:
            type: string
            format: uuid
          executionId:
            type: string
            format: uuid
          status:
            type: string
            enum: [started, completed, failed]
          timestamp:
            type: integer
            format: int64